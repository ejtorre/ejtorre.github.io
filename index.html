<!DOCTYPE html>
<html>
    
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="google-signin-client_id" content="187178059883-v97sb95tgdfug12u0ha6mp66j8hmcsfa.apps.googleusercontent.com">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.2/css/bulma.min.css">
        <script src="https://kit.fontawesome.com/130f6382ea.js" crossorigin="anonymous"></script>
    </head>
    
    <body>
        
        <nav class="navbar is-spaced">
            <div class="navbar-brand">
                <a class="navbar-item is-size-3 is-size-4-mobile" href="index.html">
                    <span class="icon-text">
                        <span class="icon"><i class="fas fa-notes-medical"></i></span>
                        <span>Mis notas de salud</span>
                    </span>
                </a> 
            </div>
            <div>
                
            </div>            
        </nav>
        
        <div id="app" class="mt-3">
        
            <div class="container is-max-widescreen">
                
                <div class="tile is-ancestor">                    
                    <div class="tile is-parent">
                        <div class="tile is-child box">
                            <div class="media">
                                <figure class="media-left">
                                    <p class="image is-64x64">
                                        <img v-bind:src="userInfo.img">
                                    </p>
                                </figure>
                                <div class="media-content">
                                    <div class="content">
                                        <p>
                                            <strong>{{userInfo.name}}</strong> <small>{{userInfo.email}}</small>
                                            <br>
                                            {{signInOutMsg}}                                        
                                        </p>
                                    </div>                                    
                                </div>
                            </div>
                            <div class="buttons is-centered mt-3">                                                                
                                <google-sign-in-button
                                    :view="signInView"
                                    :label="signInLabel"
                                    @google-button-click="handleAuthClick">
                                </google-sign-in-button>


                                <google-revoke-access-button
                                    :view="signOutView"
                                    :label="signOutLabel"
                                    @google-button-click="revokeAccess">
                                </google-revoke-access-button>
                            </div>                            
                        </div>                        
                    </div>
                    <div v-if="dataView" class="tile is-parent is-5">
                        <div class="tile is-child box">
                            <div class="media">
                                <figure class="media-left">
                                    <p class="image is-64x64">
                                        <img v-bind:src="patientInfo.img">
                                    </p>
                                </figure>
                                <div class="media-content">
                                    <div class="content">
                                        <p>
                                            <strong>{{patientInfo.name}}</strong>
                                            <br>
                                            <small>{{patientInfo.email}}</small>                                            
                                        </p>
                                    </div>                                    
                                </div>
                            </div>                            
                        </div>
                    </div>
                </div>

                <div v-if="dataView" class="tile is-ancestor">                    
                    <div class="tile is-parent">                        
                        <div class="tile is-child box">                            
                            <level-summary
                                :view="dataView"
                                :data="summaryData">
                            </level-summary>
                        </div>                        
                    </div>                
                </div>

               <div v-if="dataView" class="tile is-ancestor">
                    <div class="tile is-parent">                    
                        <div class="tile is-child box is-hidden-mobile">
                            <table-history
                                :view="dataView"
                                :data="histData">
                            </table-history>
                        </div>
                    </div>
                </div>
               
            </div>
        
            <footer class="footer mt-3">
                <div class="content has-text-centered">
                    <p><strong>Mis notas de salud </strong> por {{patientInfo.name}}</a></p>
                </div>
            </footer>
        
        </div>
      
        <script src="https://cdn.jsdelivr.net/npm/vue@3.0.11/dist/vue.global.prod.js"></script>
        <script src="/assets/js/main.js"></script>
        <script async defer src="https://apis.google.com/js/api.js"
            onload="this.onload=star()"
            onreadystatechange="if (this.readyState === 'complete') this.onload()">
        </script>
        
        
    </body>
    
</html>
